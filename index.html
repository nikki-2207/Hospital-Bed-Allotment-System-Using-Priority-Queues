<!DOCTYPE html>
<html>
<head>
  <title>Smart Hospital System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🏥 Smart Bed Allotment System</h1>

  <!-- FORM -->
  <div class="card">
    <input type="text" id="name" placeholder="Enter Patient Name">

    <select id="priority">
      <option value="3">🔴 Critical</option>
      <option value="2">🟡 Serious</option>
      <option value="1">🟢 Normal</option>
    </select>

    <button onclick="addPatient()">Add Patient</button>
    <button onclick="allocateBed()">Allocate Bed</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <h2>🛏 Beds Available: <span id="beds">5</span></h2>
  </div>

  <!-- QUEUE -->
  <div class="queue">
    <h2>📋 Waiting Queue</h2>
    <ul id="list"></ul>
  </div>

  <!-- RESULT -->
  <div class="result">
    <h2>✅ Allocation Result</h2>
    <p id="result"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
